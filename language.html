<!DOCTYPE html>

<body class="flex h-screen font-sans">

  <aside id="sidebar" class="bg-gray-800 text-white p-4 flex-shrink-0 transition-all duration-300 w-[140px] hover:w-64">
    <h2 class="text-2xl font-bold mb-6 hidden md:block">Menu</h2>
    <ul>
      <li class="mb-2">
        <a href="index.html" class="flex items-center py-2 px-2 rounded hover:bg-gray-700">
          <i class="fa-solid fa-home w-6 text-center"></i>
          <span class="ml-2 hidden md:inline">Home</span>
        </a>
      </li>

      <!-- Learn section -->
      <li class="mb-2">
        <button id="learnToggle" class="flex items-center w-full text-left py-2 px-2 rounded hover:bg-gray-700">

          <span class="ml-2 hidden md:inline">Learn ▼</span>

        </ul>
      </li>

      <li>
        <a href="analyze.html" class="flex items-center py-2 px-2 rounded hover:bg-gray-700">

          <span class="ml-2 hidden md:inline">Analyze</span>
        </a>
      </li>
    </ul>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-6 overflow-auto relative">
    <!-- Persistent Show Menu Button -->
    <button id="showSidebar" class="fixed top-4 right-4 z-50 px-3 py-1 bg-gray-400 text-white rounded hover:bg-gray-500">
      ☰ Menu
    </button>

    <section id="home">
      <h1 class="text-3xl font-bold mb-4"> Causal and Predictive Language</h1>
      <p class="text-gray-700 mb-4">
        Beginning topic, lead-in to why we need to talk about this.

  <script src="js/main.js"></script>
